<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחקי תמונות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== HOME SCREEN REDESIGN ===== */

    /* --- Title: Secular One + cartoon outline --- */
    .home-header {
      margin-bottom: 44px;
    }

    .home-header h1 {
      font-family: 'Secular One', sans-serif;
      font-size: clamp(2.6rem, 9vw, 5rem);
      color: #FFE600;
      text-shadow:
        -3px -3px 0 #1a004a,
         3px -3px 0 #1a004a,
        -3px  3px 0 #1a004a,
         3px  3px 0 #1a004a,
        -4px  0   0 #1a004a,
         4px  0   0 #1a004a,
         0   -4px 0 #1a004a,
         0    4px 0 #1a004a,
         6px  8px 0 rgba(0, 0, 0, 0.22);
      letter-spacing: -1px;
      line-height: 1.05;
      margin-bottom: 16px;
    }

    /* Subtitle as white pill badge */
    .subtitle {
      display: inline-block;
      background: rgba(255, 255, 255, 0.95);
      color: #0044aa;
      font-family: 'Secular One', sans-serif;
      font-size: 1.25rem;
      font-weight: 400;
      padding: 9px 32px;
      border-radius: 50px;
      box-shadow: 0 5px 0 rgba(0, 50, 150, 0.18), 0 8px 24px rgba(0, 0, 0, 0.14);
      letter-spacing: 0.3px;
    }

    /* --- Game grid --- */
    .games-grid {
      max-width: 530px;
      gap: 22px;
    }

    /* --- 3D toy-block cards --- */
    .game-card {
      border-radius: 28px;
      padding: 30px 18px 26px;
      border: 3px solid rgba(255, 255, 255, 0.50);
      transition: transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.16s ease;
    }

    .game-card:nth-child(1) {
      background: linear-gradient(150deg, #FF3A5C 0%, #FF7090 100%);
      box-shadow: 0 9px 0 #9e1030, 0 14px 35px rgba(255, 58, 92, 0.45);
    }
    .game-card:nth-child(2) {
      background: linear-gradient(150deg, #00C48C 0%, #56E0B0 100%);
      box-shadow: 0 9px 0 #006845, 0 14px 35px rgba(0, 196, 140, 0.45);
    }
    .game-card:nth-child(3) {
      background: linear-gradient(150deg, #5B5EF5 0%, #9899FF 100%);
      box-shadow: 0 9px 0 #2428b8, 0 14px 35px rgba(91, 94, 245, 0.45);
    }
    .game-card:nth-child(4) {
      background: linear-gradient(150deg, #FF9800 0%, #FFD54F 100%);
      box-shadow: 0 9px 0 #994500, 0 14px 35px rgba(255, 152, 0, 0.45);
    }

    /* Hover: lift up (like pressing a button) */
    a.game-card:hover {
      animation-play-state: paused;
      transform: translateY(-8px) scale(1.04) !important;
      cursor: pointer;
    }
    a.game-card:nth-child(1):hover { box-shadow: 0 17px 0 #9e1030, 0 24px 50px rgba(255, 58, 92, 0.50); }
    a.game-card:nth-child(2):hover { box-shadow: 0 17px 0 #006845, 0 24px 50px rgba(0, 196, 140, 0.50); }
    a.game-card:nth-child(3):hover { box-shadow: 0 17px 0 #2428b8, 0 24px 50px rgba(91, 94, 245, 0.50); }
    a.game-card:nth-child(4):hover { box-shadow: 0 17px 0 #994500, 0 24px 50px rgba(255, 152, 0, 0.50); }

    /* Active: press down */
    a.game-card:active {
      transform: translateY(3px) scale(0.98) !important;
    }
    a.game-card:nth-child(1):active { box-shadow: 0 2px 0 #9e1030, 0 4px 14px rgba(255, 58, 92, 0.35) !important; }
    a.game-card:nth-child(2):active { box-shadow: 0 2px 0 #006845, 0 4px 14px rgba(0, 196, 140, 0.35) !important; }
    a.game-card:nth-child(3):active { box-shadow: 0 2px 0 #2428b8, 0 4px 14px rgba(91, 94, 245, 0.35) !important; }
    a.game-card:nth-child(4):active { box-shadow: 0 2px 0 #994500, 0 4px 14px rgba(255, 152, 0, 0.35) !important; }

    /* --- Emoji circular badge --- */
    .game-emoji {
      font-size: 3.8rem;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.55);
      margin: 0 auto 14px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    a.game-card:hover .game-emoji {
      transform: scale(1.22) rotate(10deg);
      background: rgba(255, 255, 255, 0.42);
    }

    .game-card h2 {
      font-family: 'Secular One', sans-serif;
      font-size: 1.65rem;
      margin-bottom: 6px;
    }

    .game-card p {
      font-size: 0.92rem;
      opacity: 0.9;
    }

    /* --- Green hills at bottom --- */
    .bg-hills {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 240px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-hill {
      position: absolute;
      border-radius: 50%;
    }
    .hill-left {
      width: 580px;
      height: 340px;
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      bottom: -185px;
      left: -80px;
      box-shadow: 0 -8px 35px rgba(0, 150, 50, 0.25);
    }
    .hill-right {
      width: 700px;
      height: 380px;
      background: linear-gradient(180deg, #16a34a 0%, #15803d 100%);
      bottom: -210px;
      right: -120px;
      box-shadow: 0 -8px 35px rgba(0, 130, 40, 0.2);
    }
    .hill-center {
      width: 650px;
      height: 290px;
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
      bottom: -168px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 -8px 35px rgba(20, 200, 70, 0.22);
    }

    /* z-index layering */
    .bg-hills    { z-index: 0; }
    .bg-elements { z-index: 1; }
    .container   { position: relative; z-index: 2; }
  </style>
</head>
<body>

  <!-- רקע מונפש -->
  <div class="bg-elements">

    <!-- שמש עם קרניים -->
    <div class="bg-sun">
      <div class="sun-rays"></div>
      <div class="sun-body"></div>
    </div>

    <!-- קשת גאומטרית CSS -->
    <div class="bg-rainbow"></div>

    <!-- עננים CSS -->
    <div class="bg-cloud" style="top:7%;  animation: cloudLeft  30s linear infinite 0s;">
      <div class="cloud-shape cloud-lg"></div>
    </div>
    <div class="bg-cloud" style="top:21%; animation: cloudLeft  42s linear infinite -17s;">
      <div class="cloud-shape cloud-sm"></div>
    </div>
    <div class="bg-cloud" style="top:14%; animation: cloudRight 36s linear infinite -9s;">
      <div class="cloud-shape cloud-md"></div>
    </div>

    <!-- ניצוצות כוכבים -->
    <div class="bg-sparkle" style="top:10%; left:13%;  width:16px; height:16px; animation-delay:0s;"></div>
    <div class="bg-sparkle" style="top:27%; left:7%;   width:10px; height:10px; animation-delay:1.1s;"></div>
    <div class="bg-sparkle" style="top:34%; right:9%;  width:14px; height:14px; animation-delay:0.5s;"></div>
    <div class="bg-sparkle" style="top:17%; right:6%;  width:9px;  height:9px;  animation-delay:1.8s;"></div>
    <div class="bg-sparkle" style="top:6%;  left:42%;  width:12px; height:12px; animation-delay:2.3s;"></div>
    <div class="bg-sparkle" style="top:45%; left:24%;  width:10px; height:10px; animation-delay:0.9s;"></div>
    <div class="bg-sparkle" style="top:22%; left:30%;  width:8px;  height:8px;  animation-delay:1.5s;"></div>
    <div class="bg-sparkle" style="top:38%; right:22%; width:11px; height:11px; animation-delay:0.3s;"></div>
    <div class="bg-sparkle" style="top:12%; right:30%; width:7px;  height:7px;  animation-delay:2.7s;"></div>

  </div>

  <!-- גבעות ירוקות -->
  <div class="bg-hills">
    <div class="bg-hill hill-left"></div>
    <div class="bg-hill hill-right"></div>
    <div class="bg-hill hill-center"></div>
  </div>

  <div class="container">
    <header class="home-header">
      <h1>🎮 משחקי תמונות</h1>
      <p class="subtitle">בחרו משחק!</p>
    </header>

    <div class="games-grid">

      <a href="memory.html" class="game-card">
        <div class="game-emoji">🃏</div>
        <h2>זיכרון</h2>
        <p>הפכו קלפים ומצאו זוגות</p>
      </a>

      <a href="oddone.html" class="game-card">
        <div class="game-emoji">🔍</div>
        <h2>מי שונה?</h2>
        <p>מצאו מי יוצא דופן</p>
      </a>

      <a href="sorting.html" class="game-card">
        <div class="game-emoji">🗂️</div>
        <h2>מיון</h2>
        <p>גררו כל אימוג'י לקופסה שלו</p>
      </a>

      <a href="opposites.html" class="game-card">
        <div class="game-emoji">🔄</div>
        <h2>הפכים</h2>
        <p>מצאו את ההפך של כל מילה</p>
      </a>

    </div>
  </div>
</body>
</html>
