<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק מיון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- רקע מונפש -->
  <div class="bg-elements">
    <div class="bg-sun">
      <div class="sun-rays"></div>
      <div class="sun-body"></div>
    </div>
    <div class="bg-rainbow"></div>
    <div class="bg-cloud" style="top:7%;  animation: cloudLeft  30s linear infinite 0s;">
      <div class="cloud-shape cloud-lg"></div>
    </div>
    <div class="bg-cloud" style="top:21%; animation: cloudLeft  42s linear infinite -17s;">
      <div class="cloud-shape cloud-sm"></div>
    </div>
    <div class="bg-cloud" style="top:14%; animation: cloudRight 36s linear infinite -9s;">
      <div class="cloud-shape cloud-md"></div>
    </div>
    <div class="bg-sparkle" style="top:10%; left:13%;  width:12px; height:12px; animation-delay:0s;"></div>
    <div class="bg-sparkle" style="top:27%; left:7%;   width:8px;  height:8px;  animation-delay:1.1s;"></div>
    <div class="bg-sparkle" style="top:55%; right:9%;  width:11px; height:11px; animation-delay:0.5s;"></div>
    <div class="bg-sparkle" style="top:38%; right:5%;  width:7px;  height:7px;  animation-delay:1.8s;"></div>
    <div class="bg-sparkle" style="top:6%;  left:47%;  width:9px;  height:9px;  animation-delay:2.3s;"></div>
    <div class="bg-sparkle" style="top:70%; left:22%;  width:8px;  height:8px;  animation-delay:0.9s;"></div>
  </div>

  <div class="container">
    <a href="index.html" class="back-btn">← חזרה לבית</a>
    <h1 class="game-title">🗂️ משחק מיון</h1>

    <!-- ===== מסך הגדרות ===== -->
    <div id="setup-screen" class="setup-screen">
      <h2>בחרו קטגוריות למיון:</h2>

      <div class="section-gap">
        <p class="section-label">בחרו 2 או 3 קטגוריות</p>
        <div class="sort-cat-grid" id="sort-cat-grid">
          <button class="sort-cat-btn active" data-cat="animals"   onclick="toggleCategory(this)">
            <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f43e.svg" class="cat-btn-img" draggable="false">חיות</button>
          <button class="sort-cat-btn active" data-cat="food"      onclick="toggleCategory(this)">
            <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" class="cat-btn-img" draggable="false">אוכל</button>
          <button class="sort-cat-btn"        data-cat="transport" onclick="toggleCategory(this)">
            <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f697.svg" class="cat-btn-img" draggable="false">תחבורה</button>
          <button class="sort-cat-btn"        data-cat="toys"      onclick="toggleCategory(this)">
            <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg"  class="cat-btn-img" draggable="false">משחקים</button>
        </div>
        <p id="cat-count-label" style="color:var(--secondary); font-weight:bold; margin-top:8px;">✅ 2 קטגוריות נבחרו</p>
      </div>

      <button class="btn btn-primary" onclick="startGame()"
              style="font-size:1.3rem; padding:16px 55px;">
        🎮 התחל!
      </button>
    </div>

    <!-- ===== מסך המשחק ===== -->
    <div id="game-screen" class="game-screen hidden">
      <div class="game-header">
        <span>מוין: <strong id="sorted-count">0</strong> / <strong id="sorted-total">10</strong></span>
        <button class="btn btn-accent" onclick="resetToSetup()"
                style="font-size:0.95rem; padding:8px 20px;">🔄 מחדש</button>
      </div>

      <div class="sort-arena">
        <div class="sort-item-wrapper" id="sort-item-wrapper">
          <div class="sort-item" id="sort-item">🐶</div>
        </div>
        <div class="sort-boxes" id="sort-boxes"></div>
      </div>
    </div>

    <!-- ===== מסך ניצחון ===== -->
    <div id="victory-screen" class="victory-screen hidden">
      <span class="victory-emoji">🎉</span>
      <h2>כל הכבוד!</h2>
      <p>מיינתם <strong id="final-score">0</strong> פריטים!</p>
      <div class="victory-btns">
        <button class="btn btn-primary" onclick="resetToSetup()">🔄 שחקו שוב</button>
        <a href="index.html" class="btn btn-secondary">🏠 בית</a>
      </div>
    </div>

  </div>

  <script src="sorting.js"></script>
</body>
</html>
