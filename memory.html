<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק זיכרון</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- רקע מונפש -->
  <div class="bg-elements">

    <!-- שמש עם קרניים -->
    <div class="bg-sun">
      <div class="sun-rays"></div>
      <div class="sun-body"></div>
    </div>

    <!-- קשת גאומטרית CSS -->
    <div class="bg-rainbow"></div>

    <!-- עננים CSS -->
    <div class="bg-cloud" style="top:7%;  animation: cloudLeft  30s linear infinite 0s;">
      <div class="cloud-shape cloud-lg"></div>
    </div>
    <div class="bg-cloud" style="top:21%; animation: cloudLeft  42s linear infinite -17s;">
      <div class="cloud-shape cloud-sm"></div>
    </div>
    <div class="bg-cloud" style="top:14%; animation: cloudRight 36s linear infinite -9s;">
      <div class="cloud-shape cloud-md"></div>
    </div>

    <!-- ניצוצות -->
    <div class="bg-sparkle" style="top:10%; left:13%;  width:12px; height:12px; animation-delay:0s;"></div>
    <div class="bg-sparkle" style="top:27%; left:7%;   width:8px;  height:8px;  animation-delay:1.1s;"></div>
    <div class="bg-sparkle" style="top:55%; right:9%;  width:11px; height:11px; animation-delay:0.5s;"></div>
    <div class="bg-sparkle" style="top:38%; right:5%;  width:7px;  height:7px;  animation-delay:1.8s;"></div>
    <div class="bg-sparkle" style="top:6%;  left:47%;  width:9px;  height:9px;  animation-delay:2.3s;"></div>
    <div class="bg-sparkle" style="top:70%; left:22%;  width:8px;  height:8px;  animation-delay:0.9s;"></div>

  </div>

  <div class="container">
    <a href="index.html" class="back-btn">← חזרה לבית</a>
    <h1 class="game-title">🃏 משחק זיכרון</h1>

    <!-- ===== מסך הגדרות ===== -->
    <div id="setup-screen" class="setup-screen">

      <h2>איך רוצים לשחק?</h2>

      <!-- יחיד / מרובה משתתפים -->
      <div class="players-mode-selector section-gap">
        <button class="mode-btn active" onclick="selectGameMode('single', this)">👤 משחק יחיד</button>
        <button class="mode-btn"        onclick="selectGameMode('multi',  this)">👥 מרובה משתתפים</button>
      </div>

      <!-- שמות שחקנים -->
      <div id="players-section" class="section-gap hidden">
        <p class="section-label">שחקנים:</p>
        <div id="player-inputs-container">
          <div class="player-input-row">
            <span class="player-color-dot" style="background:#FF6B6B;"></span>
            <button class="player-emoji-btn" onclick="cycleEmoji(this)">🦁</button>
            <input type="text" class="player-name-input" placeholder="שם שחקן 1" maxlength="12">
          </div>
          <div class="player-input-row">
            <span class="player-color-dot" style="background:#4ECDC4;"></span>
            <button class="player-emoji-btn" onclick="cycleEmoji(this)">🐯</button>
            <input type="text" class="player-name-input" placeholder="שם שחקן 2" maxlength="12">
          </div>
        </div>
        <button class="btn btn-accent" id="add-player-btn" onclick="addPlayerInput()"
                style="font-size:0.9rem; padding:8px 22px; margin-top:10px;">
          ＋ הוסף שחקן
        </button>
      </div>

      <hr class="divider">

      <!-- בחירת מצב -->
      <div class="mode-selector section-gap">
        <button class="mode-btn active" id="emoji-mode-btn" onclick="selectMode('emoji', this)">
          🎨 אימוג'י
        </button>
        <button class="mode-btn" id="photo-mode-btn" onclick="selectMode('photos', this)">
          📸 תמונות שלנו
        </button>
      </div>

      <!-- חלק אימוג'י -->
      <div id="emoji-section" class="section-gap">
        <p class="section-label">בחרו קטגוריה:</p>
        <div class="emoji-categories">
          <button class="category-btn active" onclick="selectCategory('animals', this)">🐶 חיות</button>
          <button class="category-btn" onclick="selectCategory('food', this)">🍎 אוכל</button>
          <button class="category-btn" onclick="selectCategory('transport', this)">🚗 תחבורה</button>
          <button class="category-btn" onclick="selectCategory('toys', this)">⚽ משחקים</button>
        </div>
      </div>

      <!-- חלק תמונות -->
      <div id="photo-section" class="section-gap hidden">
        <p class="section-label">בחרו תמונות מהמחשב:</p>
        <label class="photo-upload-label">
          📁 בחרו תמונות
          <input type="file" id="photo-input" multiple accept="image/*"
                 style="display:none" onchange="handlePhotoUpload(this)">
        </label>
        <div class="photo-preview" id="photo-preview"></div>
        <p class="photo-count" id="photo-count"></p>
      </div>

      <hr class="divider">

      <!-- צבע גב הקלפים -->
      <div class="section-gap">
        <p class="section-label">צבע גב הקלפים:</p>
        <div class="color-selector">
          <button class="color-swatch active" onclick="selectCardColor('red', this)"    title="אדום-ורוד" style="background: linear-gradient(145deg, #FF6B6B, #FF9A9A);">&#8203;</button>
          <button class="color-swatch"        onclick="selectCardColor('blue', this)"   title="כחול"      style="background: linear-gradient(145deg, #4a90d9, #74b3ef);">&#8203;</button>
          <button class="color-swatch"        onclick="selectCardColor('green', this)"  title="ירוק"      style="background: linear-gradient(145deg, #27ae60, #55efc4);">&#8203;</button>
          <button class="color-swatch"        onclick="selectCardColor('purple', this)" title="סגול"      style="background: linear-gradient(145deg, #6C5CE7, #a29bfe);">&#8203;</button>
          <button class="color-swatch"        onclick="selectCardColor('orange', this)" title="כתום"      style="background: linear-gradient(145deg, #e17055, #fab1a0);">&#8203;</button>
        </div>
      </div>

      <hr class="divider">

      <!-- רמת קושי -->
      <div class="section-gap">
        <p class="section-label">רמת קושי:</p>
        <div class="difficulty-selector">
          <button class="mode-btn active" id="easy-btn" onclick="selectDifficulty('easy', this)">
            😊 קל — 6 זוגות
          </button>
          <button class="mode-btn" id="hard-btn" onclick="selectDifficulty('hard', this)">
            🤔 קשה — 8 זוגות
          </button>
        </div>
      </div>

      <button class="btn btn-primary" onclick="startGame()" style="font-size: 1.3rem; padding: 16px 55px;">
        🎮 התחל!
      </button>

    </div>

    <!-- ===== מסך המשחק ===== -->
    <div id="game-screen" class="game-screen hidden">

      <!-- כותרת מצב יחיד -->
      <div class="game-header" id="game-header-single">
        <span>מהלכים: <strong id="moves-count">0</strong></span>
        <span>זוגות: <strong id="pairs-found">0</strong> / <strong id="pairs-total">0</strong></span>
        <button class="btn btn-accent" onclick="resetToSetup()"
                style="font-size: 0.95rem; padding: 8px 20px;">
          🔄 מחדש
        </button>
      </div>

      <!-- כותרת מצב רבים -->
      <div id="game-header-multi" class="hidden">
        <div class="player-scoreboard" id="player-scoreboard"></div>
        <div class="turn-banner">
          <span id="turn-text">תור של: <strong id="current-player-name"></strong></span>
          <button class="btn btn-accent" onclick="resetToSetup()"
                  style="font-size: 0.95rem; padding: 8px 20px;">🔄 מחדש</button>
        </div>
      </div>

      <div class="memory-grid" id="memory-grid"></div>

    </div>

    <!-- ===== מסך ניצחון ===== -->
    <div id="victory-screen" class="victory-screen hidden">

      <!-- מצב יחיד -->
      <div id="single-victory">
        <span class="victory-emoji">🎉</span>
        <h2>כל הכבוד!</h2>
        <p>סיימתם ב־<strong id="final-moves">0</strong> מהלכים!</p>
      </div>

      <!-- מצב רבים -->
      <div id="multi-victory" class="hidden">
        <span class="victory-emoji" id="winner-emoji">🏆</span>
        <h2 id="winner-title">כל הכבוד!</h2>
        <div class="player-results" id="player-results"></div>
      </div>

      <div class="victory-btns">
        <button class="btn btn-primary" onclick="resetToSetup()">🔄 שחקו שוב</button>
        <a href="index.html" class="btn btn-secondary">🏠 בית</a>
      </div>
    </div>

  </div>

  <script src="memory.js"></script>
</body>
</html>
